<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-label="Officer Group Photo placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#edf4fc"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7eb3f8"/>
      <stop offset="100%" stop-color="#4f8de7"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#9db6d3" stroke-opacity="0.45" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect width="1280" height="800" fill="url(#grid)" opacity="0.55"/>
  <rect x="100" y="88" width="1080" height="624" rx="28" fill="#ffffff" stroke="#d3deed" stroke-width="2"/>
  <rect x="100" y="88" width="1080" height="78" rx="28" fill="#f4f8ff" stroke="#d3deed" stroke-width="1"/>
  <circle cx="145" cy="127" r="9" fill="#f57f7f"/>
  <circle cx="172" cy="127" r="9" fill="#f3b168"/>
  <circle cx="199" cy="127" r="9" fill="#58c49d"/>
  <text x="230" y="136" fill="#385579" font-family="'Courier New', monospace" font-size="24" letter-spacing="1.5">CHC IMAGE SLOT</text>
  <rect x="268" y="248" width="744" height="272" rx="20" fill="#f9fbff" stroke="url(#ring)" stroke-width="3" stroke-dasharray="10 8"/>
  <text x="640" y="365" fill="#1b2a40" font-family="'Courier New', monospace" font-size="58" text-anchor="middle" letter-spacing="1.5">Placeholder Image</text>
  <text x="640" y="433" fill="#516784" font-family="'Courier New', monospace" font-size="34" text-anchor="middle">Officer Group Photo</text>
</svg>
